<svg viewBox="100 100 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>CloudThinker Unified Platform Architecture</title>
  <desc>A radial graph showing 6 core modules and 10 platform capabilities connected through the central Agentic intelligence engine.</desc>

  <!-- Dashed ring circles -->
  <circle cx="500" cy="500" r="175" fill="none" stroke="rgba(255,255,255,0.24)" stroke-width="1" stroke-dasharray="5 5" />
  <circle cx="500" cy="500" r="360" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="5 5" />

  <!-- Lines from center to inner nodes -->
  <line x1="500" y1="500" x2="500" y2="325" stroke="rgba(255,255,255,0.18)" stroke-width="1" />
  <line x1="500" y1="500" x2="651.6" y2="412.5" stroke="rgba(255,255,255,0.18)" stroke-width="1" />
  <line x1="500" y1="500" x2="651.6" y2="587.5" stroke="rgba(255,255,255,0.18)" stroke-width="1" />
  <line x1="500" y1="500" x2="500" y2="675" stroke="rgba(255,255,255,0.18)" stroke-width="1" />
  <line x1="500" y1="500" x2="348.4" y2="587.5" stroke="rgba(255,255,255,0.18)" stroke-width="1" />
  <line x1="500" y1="500" x2="348.4" y2="412.5" stroke="rgba(255,255,255,0.18)" stroke-width="1" />

  <!-- Lines from center to outer nodes -->
  <line x1="500" y1="500" x2="500" y2="140" stroke="rgba(255,255,255,0.09)" stroke-width="1.12" />
  <line x1="500" y1="500" x2="711.6" y2="208.8" stroke="rgba(255,255,255,0.09)" stroke-width="1.12" />
  <line x1="500" y1="500" x2="842.4" y2="388.8" stroke="rgba(255,255,255,0.09)" stroke-width="1.12" />
  <line x1="500" y1="500" x2="842.4" y2="611.2" stroke="rgba(255,255,255,0.09)" stroke-width="1.12" />
  <line x1="500" y1="500" x2="711.6" y2="791.2" stroke="rgba(255,255,255,0.09)" stroke-width="1.12" />
  <line x1="500" y1="500" x2="500" y2="860" stroke="rgba(255,255,255,0.09)" stroke-width="1.12" />
  <line x1="500" y1="500" x2="288.4" y2="791.2" stroke="rgba(255,255,255,0.09)" stroke-width="1.12" />
  <line x1="500" y1="500" x2="157.6" y2="611.2" stroke="rgba(255,255,255,0.09)" stroke-width="1.12" />
  <line x1="500" y1="500" x2="157.6" y2="388.8" stroke="rgba(255,255,255,0.09)" stroke-width="1.12" />
  <line x1="500" y1="500" x2="288.4" y2="208.8" stroke="rgba(255,255,255,0.09)" stroke-width="1.12" />

  <!-- Center hub -->
  <circle cx="500" cy="500" r="42" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" />
  <text x="500" y="496" text-anchor="middle" dominant-baseline="central" fill="rgba(255,255,255,0.94)" font-size="14" font-weight="600" font-family="monospace" letter-spacing="0.5">Agentic</text>
  <text x="500" y="514" text-anchor="middle" dominant-baseline="central" fill="rgba(255,255,255,0.7)" font-size="9" font-family="monospace" letter-spacing="1">PLATFORM</text>

  <!-- Inner nodes (core modules) -->
  <!-- Code Review -->
  <circle cx="500" cy="325" r="16" fill="#00e5c8" opacity="0.3" />
  <circle cx="500" cy="325" r="8" fill="#00e5c8" opacity="0.95" />
  <text x="500" y="306" text-anchor="middle" fill="rgba(255,255,255,0.94)" font-size="15" font-weight="500">Code Review</text>

  <!-- Incident -->
  <circle cx="651.6" cy="412.5" r="16" fill="#f43f5e" opacity="0.3" />
  <circle cx="651.6" cy="412.5" r="8" fill="#f43f5e" opacity="0.95" />
  <text x="672.4" y="405.5" text-anchor="start" fill="rgba(255,255,255,0.94)" font-size="15" font-weight="500">Incident</text>

  <!-- HelpDesk -->
  <circle cx="651.6" cy="587.5" r="16" fill="#3b82f6" opacity="0.3" />
  <circle cx="651.6" cy="587.5" r="8" fill="#3b82f6" opacity="0.95" />
  <text x="672.4" y="604.5" text-anchor="start" fill="rgba(255,255,255,0.94)" font-size="15" font-weight="500">HelpDesk</text>

  <!-- Infra Ops -->
  <circle cx="500" cy="675" r="16" fill="#8b5cf6" opacity="0.3" />
  <circle cx="500" cy="675" r="8" fill="#8b5cf6" opacity="0.95" />
  <text x="500" y="704" text-anchor="middle" fill="rgba(255,255,255,0.94)" font-size="15" font-weight="500">Infra Ops</text>

  <!-- CloudKeeper -->
  <circle cx="348.4" cy="587.5" r="16" fill="#10b981" opacity="0.3" />
  <circle cx="348.4" cy="587.5" r="8" fill="#10b981" opacity="0.95" />
  <text x="327.6" y="604.5" text-anchor="end" fill="rgba(255,255,255,0.94)" font-size="15" font-weight="500">CloudKeeper</text>

  <!-- SlackOps -->
  <circle cx="348.4" cy="412.5" r="16" fill="#f59e0b" opacity="0.3" />
  <circle cx="348.4" cy="412.5" r="8" fill="#f59e0b" opacity="0.95" />
  <text x="327.6" y="405.5" text-anchor="end" fill="rgba(255,255,255,0.94)" font-size="15" font-weight="500">SlackOps</text>

  <!-- Outer nodes (platform capabilities) -->
  <!-- Skills -->
  <circle cx="500" cy="140" r="12" fill="#ec4899" opacity="0.24" />
  <circle cx="500" cy="140" r="6" fill="#ec4899" opacity="0.94" />
  <text x="500" y="125" text-anchor="middle" fill="rgba(255,255,255,0.81)" font-size="13" font-weight="400">Skills</text>

  <!-- Autonomy -->
  <circle cx="711.6" cy="208.8" r="12" fill="#84cc16" opacity="0.24" />
  <circle cx="711.6" cy="208.8" r="6" fill="#84cc16" opacity="0.94" />
  <text x="723.4" y="197.6" text-anchor="start" fill="rgba(255,255,255,0.81)" font-size="13" font-weight="400">Autonomy</text>

  <!-- Sandbox -->
  <circle cx="842.4" cy="388.8" r="12" fill="#6366f1" opacity="0.24" />
  <circle cx="842.4" cy="388.8" r="6" fill="#6366f1" opacity="0.94" />
  <text x="861.4" y="387.6" text-anchor="start" fill="rgba(255,255,255,0.81)" font-size="13" font-weight="400">Sandbox</text>

  <!-- Runbook -->
  <circle cx="842.4" cy="611.2" r="12" fill="#38bdf8" opacity="0.24" />
  <circle cx="842.4" cy="611.2" r="6" fill="#38bdf8" opacity="0.94" />
  <text x="861.4" y="622.4" text-anchor="start" fill="rgba(255,255,255,0.81)" font-size="13" font-weight="400">Runbook</text>

  <!-- Connections -->
  <circle cx="711.6" cy="791.2" r="12" fill="#fb923c" opacity="0.24" />
  <circle cx="711.6" cy="791.2" r="6" fill="#fb923c" opacity="0.94" />
  <text x="723.4" y="812.4" text-anchor="start" fill="rgba(255,255,255,0.81)" font-size="13" font-weight="400">Connections</text>

  <!-- Knowledge -->
  <circle cx="500" cy="860" r="12" fill="#14b8a6" opacity="0.24" />
  <circle cx="500" cy="860" r="6" fill="#14b8a6" opacity="0.94" />
  <text x="500" y="885" text-anchor="middle" fill="rgba(255,255,255,0.81)" font-size="13" font-weight="400">Knowledge</text>

  <!-- Topology -->
  <circle cx="288.4" cy="791.2" r="12" fill="#a78bfa" opacity="0.24" />
  <circle cx="288.4" cy="791.2" r="6" fill="#a78bfa" opacity="0.94" />
  <text x="276.6" y="812.4" text-anchor="end" fill="rgba(255,255,255,0.81)" font-size="13" font-weight="400">Topology</text>

  <!-- Memory -->
  <circle cx="157.6" cy="611.2" r="12" fill="#eab308" opacity="0.24" />
  <circle cx="157.6" cy="611.2" r="6" fill="#eab308" opacity="0.94" />
  <text x="138.6" y="622.4" text-anchor="end" fill="rgba(255,255,255,0.81)" font-size="13" font-weight="400">Memory</text>

  <!-- Guardrails -->
  <circle cx="157.6" cy="388.8" r="12" fill="#ef4444" opacity="0.24" />
  <circle cx="157.6" cy="388.8" r="6" fill="#ef4444" opacity="0.94" />
  <text x="138.6" y="387.6" text-anchor="end" fill="rgba(255,255,255,0.81)" font-size="13" font-weight="400">Guardrails</text>

  <!-- Observability -->
  <circle cx="288.4" cy="208.8" r="12" fill="#64748b" opacity="0.24" />
  <circle cx="288.4" cy="208.8" r="6" fill="#64748b" opacity="0.94" />
  <text x="276.6" y="197.6" text-anchor="end" fill="rgba(255,255,255,0.81)" font-size="13" font-weight="400">Observability</text>
</svg>
